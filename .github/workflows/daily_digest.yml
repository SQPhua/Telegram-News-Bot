name: Daily News Digest

on:
  # Note: the native `schedule:` trigger has been removed. GitHub's own cron
  # scheduler proved unreliable for this repo (runs firing hours late or not
  # at all). Daily triggering is now handled externally by cron-job.org,
  # which calls this workflow's `workflow_dispatch` via GitHub's API on a
  # reliable daily schedule instead.
  workflow_dispatch:
    inputs:
      topic:
        description: "Override the news topic for this manual run"
        required: false
        default: ""

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit sent_articles.json back to the repo
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_TOPIC: ${{ github.event.inputs.topic || vars.NEWS_TOPIC || 'technology' }}
        run: python news_bot.py

      - name: Save sent-articles history
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_articles.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update sent-articles history [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No changes to sent_articles.json - nothing to commit."
          fi
